---
layout: default
---
<style>
    .back-link {
        color: var(--clr-primary-a0);
        text-decoration: none;
        margin-bottom: 20px;
        display: inline-block;
    }
    
    .back-link:hover {
        text-decoration: underline;
        color: var(--clr-primary-a20);
    }
    
    .date {
        color: var(--clr-primary-a50);
        font-size: 0.9em;
        margin-bottom: 20px;
    }

    .post-footer {
        margin-top: 40px;
        font-size: 0.85em;
        font-style: italic;
        color: var(--clr-surface-a40);
    }

    .back-link.bottom {
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid var(--clr-surface-a20);
        display: block;
    }

    .content table {
        width: 100%;
        border-collapse: collapse;
        margin: 20px 0;
    }

    .content th,
    .content td {
        padding: 12px 16px;
        text-align: left;
        vertical-align: top;
        border-bottom: 1px solid var(--clr-surface-a20);
    }

    .content th {
        background-color: var(--clr-surface-tonal-a0);
        color: var(--clr-primary-a30);
        font-weight: bold;
        border-bottom: 2px solid var(--clr-surface-a30);
    }

    .content tr:last-child td {
        border-bottom: none;
    }

    .content img {
        max-width: 40%;
        height: auto;
        display: block;
        margin: 20px auto;
    }
</style>

<a href="/" class="back-link">← back</a>

<h1>{{ page.title }}</h1>
<div class="date">{{ page.date | date: "%B %d, %Y" }}</div>

<div class="content">
    {{ content }}
</div>

{% if page.attribution %}
<div class="post-footer">
    {{ page.attribution }}
</div>
{% endif %}

<a href="/" class="back-link bottom">← back</a>
